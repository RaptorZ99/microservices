apiVersion: apps/v1
kind: Deployment
metadata:
  name: book-service
  labels:
    app: book-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: book-service
  template:
    metadata:
      labels:
        app: book-service
    spec:
      containers:
        - name: book-service
          image: louisscrf/book-service:latest
          ports:
            - containerPort: 9000
          env:
            - name: DATABASE_URL
              value: "file:/app/data/dev.db"
            - name: JWT_SECRET
              value: "change-me"
            - name: PORT
              value: "9000"
            - name: OPENLIBRARY_USER_AGENT
              value: "BookInsights/1.0 (contact@example.com)"
            - name: BOOK_SEARCH_LIMIT
              value: "12"

          volumeMounts:
            - name: book-storage
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 2
            periodSeconds: 5

      volumes:
        - name: book-storage
          persistentVolumeClaim:
            claimName: book-pvc
