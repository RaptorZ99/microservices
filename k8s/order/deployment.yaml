apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  labels:
    app: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: louisscrf/order-service:latest
          ports:
            - containerPort: 4000
          env:
            - name: DATABASE_URL
              value: "file:/app/data/dev.db"
            - name: JWT_SECRET
              value: "change-me"
            - name: PORT
              value: "4000"

          volumeMounts:
            - name: order-storage
              mountPath: /app/data

          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 2
            periodSeconds: 5

      volumes:
        - name: order-storage
          persistentVolumeClaim:
            claimName: order-pvc
