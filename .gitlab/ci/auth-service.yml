# ─────────────────────────────────────────────────────────
# .gitlab/ci/auth-service.yml
# ─────────────────────────────────────────────────────────

.auth:rules:
  rules:
    - changes:
        - auth-service/**/*
        - .gitlab/ci/auth-service.yml
        - .gitlab-ci.yml

lint:auth-service:
  stage: lint
  image: python:3.12-slim
  extends: .auth:rules
  cache:
    key: "auth-deps-$CI_COMMIT_REF_SLUG"
    paths:
      - auth-service/.venv/
  script:
    - echo "=== Lint Auth Service ==="
    - cd auth-service
    - python -m venv .venv
    - .venv/bin/pip install --upgrade pip -q
    - .venv/bin/pip install -r requirements.txt -q
    - .venv/bin/pip install flake8 -q
    - .venv/bin/flake8 . --count --max-line-length=120 --statistics --exclude=.venv

build:auth-service:
  stage: build
  extends:
    - .job:build-push
  variables:
    SERVICE_NAME: "auth-service"
    SERVICE_PATH: "./auth-service"

sbom:auth-service:
  extends: .job:sbom
  variables:
    SERVICE_NAME: "auth-service"

grype:auth-service:
  extends: .job:grype
  needs:
    - job: sbom:auth-service
      artifacts: true
  variables:
    SERVICE_NAME: "auth-service"

sign:auth-service:
  extends: .job:sign
  needs:
    - job: build:auth-service
      artifacts: false
  variables:
    SERVICE_NAME: "auth-service"
