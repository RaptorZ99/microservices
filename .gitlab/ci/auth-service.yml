# ─────────────────────────────────────────────────────────
# .gitlab/ci/auth-service.yml
# ─────────────────────────────────────────────────────────

.auth:rules:
  rules:
    - changes:
        - auth-service/**/*
        - .gitlab/ci/auth-service.yml
        - .gitlab-ci.yml

lint:auth-service:
  stage: verify
  image: python:3.12-slim
  extends: .auth:rules
  cache:
    key: "auth-deps-$CI_COMMIT_REF_SLUG"
    paths:
      - auth-service/.venv/
  script:
    - echo "=== Lint Auth Service ==="
    - cd auth-service
    - python -m venv .venv
    - .venv/bin/pip install --upgrade pip -q
    - .venv/bin/pip install -r requirements.txt -q
    - .venv/bin/pip install flake8 -q
    - .venv/bin/flake8 . --count --max-line-length=120 --statistics --exclude=.venv

test:unit:auth-service:
  stage: test
  image: python:3.12-slim
  extends: .auth:rules
  cache:
    key: "auth-deps-$CI_COMMIT_REF_SLUG"
    paths:
      - auth-service/.venv/
  script:
    - cd auth-service
    - python -m venv .venv
    - .venv/bin/pip install --upgrade pip -q
    - .venv/bin/pip install -r requirements.txt -r requirements-dev.txt -q
    - .venv/bin/pytest tests/unit/ -v --junitxml=unit-report.xml
  artifacts:
    reports:
      junit: auth-service/unit-report.xml
    expire_in: 1 week

build:auth-service:
  stage: build
  extends: .job:build
  variables:
    SERVICE_NAME: "auth-service"
    SERVICE_PATH: "./auth-service"

sign:auth-service:
  extends: .job:sign
  needs:
    - build:auth-service
  variables:
    SERVICE_NAME: "auth-service"

sbom:auth-service:
  extends: .job:sbom
  needs:
    - build:auth-service
  variables:
    SERVICE_NAME: "auth-service"

grype:auth-service:
  extends: .job:grype
  needs:
    - sbom:auth-service
  variables:
    SERVICE_NAME: "auth-service"

check:auth-service:
  extends: .job:check
  needs:
    - sign:auth-service
  variables:
    SERVICE_NAME: "auth-service"
