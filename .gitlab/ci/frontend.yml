# ─────────────────────────────────────────────────────────
# Pipeline Frontend (Next.js)
# ─────────────────────────────────────────────────────────

# Règles : s'exécute uniquement si des fichiers frontend ont changé
.frontend:rules:
  rules:
    - changes:
        - frontend/**/*
        - .gitlab/ci/frontend.yml
        - .gitlab-ci.yml

lint:frontend:
  stage: lint
  image: node:20-alpine
  extends: .frontend:rules
  cache:
    key: "frontend-deps-$CI_COMMIT_REF_SLUG"
    paths:
      - frontend/node_modules/
  script:
    - echo "=== Lint Frontend ==="
    - cd frontend
    - npm ci
    - npm run lint

notify:frontend:
  stage: lint
  image: alpine:3.19
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
      changes:
        - frontend/**/*
        - .gitlab/ci/frontend.yml
        - .gitlab-ci.yml
  script:
    - 'echo "Frontend modifie sur develop -- build et deploiement DEV a venir"'
    - 'echo "Branche  : $CI_COMMIT_BRANCH"'
    - 'echo "Commit   : $CI_COMMIT_SHORT_SHA"'
    - 'echo "Message  : $CI_COMMIT_TITLE"'
    - 'echo "Pipeline : $CI_PIPELINE_URL"'

build:frontend:
  stage: build
  image: node:20-alpine
  extends: .frontend:rules
  cache:
    key: "frontend-deps-$CI_COMMIT_REF_SLUG"
    paths:
      - frontend/node_modules/
  script:
    - echo "=== Build Frontend ==="
    - cd frontend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - frontend/.next/
    expire_in: 1 hour

verify:build:frontend:
  stage: build
  image: alpine:3.19
  extends: .frontend:rules
  needs:
    - job: build:frontend
      artifacts: true
  script:
    - echo "=== Verification du build Frontend ==="
    - test -d frontend/.next && echo "OK frontend/.next/ existe" || { echo "ERREUR frontend/.next/ manquant"; exit 1; }
    - 'echo "Taille : $(du -sh frontend/.next | cut -f1)"'
