# =============================================================
# Pipeline CI — frontend (Next.js)
# =============================================================

frontend:lint:
  stage: lint
  image: node:22-alpine
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^feature\//'
      changes: [frontend/**/*]
    - if: '$CI_COMMIT_BRANCH =~ /^hotfix\//'
      changes: [frontend/**/*]
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: [frontend/**/*]
    - if: '$CI_COMMIT_BRANCH == "develop"'
      changes: [frontend/**/*]
    - if: '$CI_COMMIT_BRANCH == "main"'
  cache:
    key: frontend-${CI_COMMIT_REF_SLUG}
    paths:
      - frontend/node_modules/
      - frontend/.npm/
  script:
    - cd frontend
    - npm ci --cache .npm --prefer-offline
    - npm run lint

frontend:build:
  stage: build
  image: node:22-alpine
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
      changes: [frontend/**/*]
    - if: '$CI_COMMIT_BRANCH == "main"'
  needs:
    - job: frontend:lint
      optional: true
  cache:
    key: frontend-${CI_COMMIT_REF_SLUG}
    paths:
      - frontend/node_modules/
      - frontend/.npm/
  script:
    - cd frontend
    - npm ci --cache .npm --prefer-offline
    - npm run build
  artifacts:
    paths:
      - frontend/.next/
    expire_in: 1 hour
