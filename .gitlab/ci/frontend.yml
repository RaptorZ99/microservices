# ─────────────────────────────────────────────────────────
# .gitlab/ci/frontend.yml
# DAG: lint → build → sign(main) → sbom → grype → check(main)
# ─────────────────────────────────────────────────────────

.frontend:rules:
  rules:
    - changes:
        - frontend/**/*
        - .gitlab/ci/frontend.yml
        - .gitlab-ci.yml

lint:frontend:
  stage: lint
  image: node:20-alpine
  extends: .frontend:rules
  cache:
    key: "frontend-deps-$CI_COMMIT_REF_SLUG"
    paths:
      - frontend/node_modules/
  script:
    - echo "=== Lint Frontend ==="
    - cd frontend
    - npm ci
    - npm run lint

build:frontend:
  stage: build
  extends:
    - .job:build-push
  needs:
    - job: lint:frontend
      artifacts: false
      optional: true
  variables:
    SERVICE_NAME: "frontend"
    SERVICE_PATH: "./frontend"

sign:frontend:
  extends: .job:sign
  needs:
    - job: build:frontend
      artifacts: false
      optional: true
  variables:
    SERVICE_NAME: "frontend"

sbom:frontend:
  extends: .job:sbom
  needs:
    - job: build:frontend
      artifacts: false
      optional: true
  variables:
    SERVICE_NAME: "frontend"

grype:frontend:
  extends: .job:grype
  needs:
    - job: sbom:frontend
      artifacts: true
      optional: true
  variables:
    SERVICE_NAME: "frontend"

check:frontend:
  extends: .job:check
  needs:
    - job: sign:frontend
      artifacts: false
      optional: true
  variables:
    SERVICE_NAME: "frontend"
