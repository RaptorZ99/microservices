# ─────────────────────────────────────────────────────────
# .gitlab/ci/frontend.yml
# ─────────────────────────────────────────────────────────

.frontend:rules:
  rules:
    - changes:
        - frontend/**/*
        - .gitlab/ci/frontend.yml
        - .gitlab-ci.yml

lint:frontend:
  stage: verify
  image: node:20-alpine
  extends: .frontend:rules
  cache:
    key: "frontend-deps-$CI_COMMIT_REF_SLUG"
    paths:
      - frontend/node_modules/
  script:
    - echo "=== Lint Frontend ==="
    - cd frontend
    - npm ci
    - npm run lint

build:frontend:
  stage: build
  extends: .job:build
  variables:
    SERVICE_NAME: "frontend"
    SERVICE_PATH: "./frontend"

sign:frontend:
  extends: .job:sign
  variables:
    SERVICE_NAME: "frontend"

sbom:frontend:
  extends: .job:sbom
  variables:
    SERVICE_NAME: "frontend"

grype:frontend:
  extends: .job:grype
  variables:
    SERVICE_NAME: "frontend"

check:frontend:
  extends: .job:check
  variables:
    SERVICE_NAME: "frontend"
