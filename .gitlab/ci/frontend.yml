# ─────────────────────────────────────────────────────────
# .gitlab/ci/frontend.yml
# ─────────────────────────────────────────────────────────

.frontend:rules:
  rules:
    - changes:
        - frontend/**/*
        - .gitlab/ci/frontend.yml
        - .gitlab-ci.yml

lint:frontend:
  stage: lint
  image: node:20-alpine
  extends: .frontend:rules
  cache:
    key: "frontend-deps-$CI_COMMIT_REF_SLUG"
    paths:
      - frontend/node_modules/
  script:
    - echo "=== Lint Frontend ==="
    - cd frontend
    - npm ci
    - npm run lint

# ── Build Docker + push multi-registry ───────────────────
# Construit l'image Docker et la pousse vers
# GitLab Registry et Docker Hub via le template
# S'exécute uniquement sur develop et main (pas sur feature/*)
# ─────────────────────────────────────────────────────────
build:frontend:
  stage: build
  extends:
    - .job:build-push
  variables:
    SERVICE_NAME: "frontend"
    SERVICE_PATH: "./frontend"
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main"'

notify:frontend:
  stage: lint
  image: alpine:3.19
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
      changes:
        - frontend/**/*
        - .gitlab/ci/frontend.yml
        - .gitlab-ci.yml
  script:
    - 'echo "Frontend modifie sur develop -- build et deploiement DEV a venir"'
    - 'echo "Branche  : $CI_COMMIT_BRANCH"'
    - 'echo "Commit   : $CI_COMMIT_SHORT_SHA"'
    - 'echo "Message  : $CI_COMMIT_TITLE"'
    - 'echo "Pipeline : $CI_PIPELINE_URL"'

# ── SBOM — Inventaire des composants ────────────────────
sbom:frontend:
  stage: scan
  image: alpine:3.19
  variables:
    SERVICE_NAME: "frontend"
  before_script:
    - apk add --no-cache curl
    - curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
  script:
    - IMAGE_GITLAB="$CI_REGISTRY_IMAGE/$SERVICE_NAME:$CI_COMMIT_SHORT_SHA"
    - echo "=== Generation du SBOM pour $SERVICE_NAME ==="
    - syft "$IMAGE_GITLAB" -o cyclonedx-json --file "sbom-$SERVICE_NAME.json"
    - echo "SBOM genere sbom-$SERVICE_NAME.json"
  artifacts:
    name: "sbom-$SERVICE_NAME-$CI_COMMIT_SHORT_SHA"
    paths:
      - "sbom-frontend.json"
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# ── Grype — Scan de vulnerabilites ──────────────────────
grype:frontend:
  stage: scan
  image: alpine:3.19
  needs:
    - job: sbom:frontend
      artifacts: true
  before_script:
    - apk add --no-cache curl
    - curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
  script:
    - echo "=== Scan de vulnerabilites pour frontend ==="
    - grype sbom:sbom-frontend.json
    - echo "Scan termine"
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# ── Cosign — Signature cryptographique ──────────────────
# Signature uniquement sur main : on ne signe que les images de production
sign:frontend:
  stage: scan
  image: alpine:3.19
  needs:
    - job: build:frontend
      artifacts: false
  before_script:
    - apk add --no-cache curl jq
    - curl -sSfL https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64 -o /usr/local/bin/cosign
    - chmod +x /usr/local/bin/cosign
    - curl https://raw.githubusercontent.com/sigstore/root-signing/refs/heads/main/targets/signing_config.v0.2.json | jq 'del(.rekorTlogUrls)' > /tmp/signing-config.json
    - echo "$COSIGN_PUBLIC_KEY" > /tmp/cosign.pub
  script:
    - IMAGE_GITLAB="$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA"
    - echo "=== Signature de $IMAGE_GITLAB ==="
    - echo "$CI_REGISTRY_PASSWORD" | cosign login "$CI_REGISTRY" --username "$CI_REGISTRY_USER" --password-stdin
    - cosign sign --key "$COSIGN_PRIVATE_KEY" --signing-config /tmp/signing-config.json "$IMAGE_GITLAB"
    - echo "Image signee"
    - cosign verify --key /tmp/cosign.pub --insecure-ignore-tlog=true "$IMAGE_GITLAB"
    - echo "Signature verifiee"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
