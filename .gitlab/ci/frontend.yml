# ─────────────────────────────────────────────────────────
# .gitlab/ci/frontend.yml
# ─────────────────────────────────────────────────────────

.frontend:rules:
  rules:
    - changes:
        - frontend/**/*
        - .gitlab/ci/frontend.yml
        - .gitlab-ci.yml

lint:frontend:
  stage: lint
  image: node:20-alpine
  extends: .frontend:rules
  cache:
    key: "frontend-deps-$CI_COMMIT_REF_SLUG"
    paths:
      - frontend/node_modules/
  script:
    - echo "=== Lint Frontend ==="
    - cd frontend
    - npm ci
    - npm run lint

build:frontend:
  stage: build
  extends:
    - .job:build-push
  needs:
    - job: lint:frontend
      artifacts: false
  variables:
    SERVICE_NAME: "frontend"
    SERVICE_PATH: "./frontend"

sbom:frontend:
  extends: .job:sbom
  needs:
    - job: build:frontend
      artifacts: false
  variables:
    SERVICE_NAME: "frontend"

grype:frontend:
  extends: .job:grype
  needs:
    - job: sbom:frontend
      artifacts: true
  variables:
    SERVICE_NAME: "frontend"

sign:frontend:
  extends: .job:sign
  needs:
    - job: grype:frontend
      artifacts: false
  variables:
    SERVICE_NAME: "frontend"
