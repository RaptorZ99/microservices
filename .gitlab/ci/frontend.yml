# ─────────────────────────────────────────────────────────
# .gitlab/ci/frontend.yml
# ─────────────────────────────────────────────────────────

.frontend:rules:
  rules:
    - changes:
        - frontend/**/*
        - .gitlab/ci/frontend.yml
        - .gitlab-ci.yml

lint:frontend:
  stage: verify
  image: node:20-alpine
  extends: .frontend:rules
  cache:
    key: "frontend-deps-$CI_COMMIT_REF_SLUG"
    paths:
      - frontend/node_modules/
  script:
    - echo "=== Lint Frontend ==="
    - cd frontend
    - npm ci
    - npm run lint

test:unit:frontend:
  stage: test
  image: node:20-alpine
  extends: .frontend:rules
  cache:
    key: "frontend-deps-$CI_COMMIT_REF_SLUG"
    paths:
      - frontend/node_modules/
  script:
    - cd frontend
    - npm ci
    - npx jest --ci
  artifacts:
    reports:
      junit: frontend/junit.xml
    expire_in: 1 week

build:frontend:
  stage: build
  extends: .job:build
  variables:
    SERVICE_NAME: "frontend"
    SERVICE_PATH: "./frontend"

sign:frontend:
  extends: .job:sign
  needs:
    - build:frontend
  variables:
    SERVICE_NAME: "frontend"

sbom:frontend:
  extends: .job:sbom
  needs:
    - build:frontend
  variables:
    SERVICE_NAME: "frontend"

grype:frontend:
  extends: .job:grype
  needs:
    - sbom:frontend
  variables:
    SERVICE_NAME: "frontend"

check:frontend:
  extends: .job:check
  needs:
    - sign:frontend
  variables:
    SERVICE_NAME: "frontend"
