# ─────────────────────────────────────────────────────────
# .gitlab/ci/frontend.yml
# ─────────────────────────────────────────────────────────

.frontend:rules:
  rules:
    - changes:
        - frontend/**/*
        - .gitlab/ci/frontend.yml
        - .gitlab-ci.yml

lint:frontend:
  stage: lint
  image: node:20-alpine
  extends: .frontend:rules
  cache:
    key: "frontend-deps-$CI_COMMIT_REF_SLUG"
    paths:
      - frontend/node_modules/
  script:
    - echo "=== Lint Frontend ==="
    - cd frontend
    - npm ci
    - npm run lint

# ── Build Docker + push multi-registry ───────────────────
# Construit l'image Docker et la pousse vers
# GitLab Registry et Docker Hub via le template
# S'exécute uniquement sur develop et main (pas sur feature/*)
# ─────────────────────────────────────────────────────────
build:frontend:
  stage: build
  extends:
    - .job:build-push
  variables:
    SERVICE_NAME: "frontend"
    SERVICE_PATH: "./frontend"
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main"'

notify:frontend:
  stage: lint
  image: alpine:3.19
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
      changes:
        - frontend/**/*
        - .gitlab/ci/frontend.yml
        - .gitlab-ci.yml
  script:
    - 'echo "Frontend modifie sur develop -- build et deploiement DEV a venir"'
    - 'echo "Branche  : $CI_COMMIT_BRANCH"'
    - 'echo "Commit   : $CI_COMMIT_SHORT_SHA"'
    - 'echo "Message  : $CI_COMMIT_TITLE"'
    - 'echo "Pipeline : $CI_PIPELINE_URL"'
