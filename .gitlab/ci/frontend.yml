# ─────────────────────────────────────────────────────────
# .gitlab/ci/frontend.yml
# ─────────────────────────────────────────────────────────

.frontend:rules:
  rules:
    - changes:
        - frontend/**/*
        - .gitlab/ci/frontend.yml
        - .gitlab-ci.yml

lint:frontend:
  stage: lint
  image: node:20-alpine
  extends: .frontend:rules
  cache:
    key: "frontend-deps-$CI_COMMIT_REF_SLUG"
    paths:
      - frontend/node_modules/
  script:
    - echo "=== Lint Frontend ==="
    - cd frontend
    - npm ci
    - npm run lint

build:frontend:
  stage: build
  extends:
    - .job:build-push
  variables:
    SERVICE_NAME: "frontend"
    SERVICE_PATH: "./frontend"

notify:frontend:
  stage: lint
  image: alpine:3.19
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
      changes:
        - frontend/**/*
        - .gitlab/ci/frontend.yml
        - .gitlab-ci.yml
  script:
    - 'echo "Frontend modifie sur develop -- build et deploiement DEV a venir"'
    - 'echo "Branche  : $CI_COMMIT_BRANCH"'
    - 'echo "Commit   : $CI_COMMIT_SHORT_SHA"'
    - 'echo "Message  : $CI_COMMIT_TITLE"'
    - 'echo "Pipeline : $CI_PIPELINE_URL"'

sbom:frontend:
  extends: .job:sbom
  variables:
    SERVICE_NAME: "frontend"

grype:frontend:
  extends: .job:grype
  needs:
    - job: sbom:frontend
      artifacts: true
  variables:
    SERVICE_NAME: "frontend"

sign:frontend:
  extends: .job:sign
  needs:
    - job: build:frontend
      artifacts: false
  variables:
    SERVICE_NAME: "frontend"
