# ─────────────────────────────────────────────────────────
# Pipeline Order Service (NestJS)
# ─────────────────────────────────────────────────────────

.order:rules:
  rules:
    - changes:
        - order-service/**/*
        - .gitlab/ci/order-service.yml
        - .gitlab-ci.yml

lint:order-service:
  stage: lint
  image: node:20-alpine
  extends: .order:rules
  cache:
    key: "order-deps-$CI_COMMIT_REF_SLUG"
    paths:
      - order-service/node_modules/
  variables:
    DATABASE_URL: "file:/tmp/dev.db"
  script:
    - echo "=== Lint Order Service ==="
    - cd order-service
    - npm ci
    - npx prisma generate
    - npm run lint

build:order-service:
  stage: build
  image: node:20-alpine
  extends: .order:rules
  cache:
    key: "order-deps-$CI_COMMIT_REF_SLUG"
    paths:
      - order-service/node_modules/
  variables:
    DATABASE_URL: "file:/tmp/dev.db"
  script:
    - echo "=== Build Order Service ==="
    - cd order-service
    - npm ci
    - npx prisma generate
    - npm run build
  artifacts:
    paths:
      - order-service/dist/
    expire_in: 1 hour
