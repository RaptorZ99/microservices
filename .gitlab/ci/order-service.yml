# ─────────────────────────────────────────────────────────
# .gitlab/ci/order-service.yml
# ─────────────────────────────────────────────────────────

.order:rules:
  rules:
    - changes:
        - order-service/**/*
        - .gitlab/ci/order-service.yml
        - .gitlab-ci.yml

lint:order-service:
  stage: lint
  image: node:20-alpine
  extends: .order:rules
  cache:
    key: "order-deps-$CI_COMMIT_REF_SLUG"
    paths:
      - order-service/node_modules/
  variables:
    DATABASE_URL: "file:/tmp/dev.db"
  script:
    - echo "=== Lint Order Service ==="
    - cd order-service
    - npm ci
    - npx prisma generate
    - npm run lint

# ── Build Docker + push multi-registry ───────────────────
build:order-service:
  stage: build
  extends:
    - .job:build-push
  variables:
    SERVICE_NAME: "order-service"
    SERVICE_PATH: "./order-service"
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main"'
