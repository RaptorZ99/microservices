# =============================================================
# Pipeline CI — order-service (NestJS)
# =============================================================

order:lint:
  stage: lint
  image: node:22-alpine
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^feature\//'
      changes: [order-service/**/*]
    - if: '$CI_COMMIT_BRANCH =~ /^hotfix\//'
      changes: [order-service/**/*]
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: [order-service/**/*]
    - if: '$CI_COMMIT_BRANCH == "develop"'
      changes: [order-service/**/*]
    - if: '$CI_COMMIT_BRANCH == "main"'
  cache:
    key: order-${CI_COMMIT_REF_SLUG}
    paths:
      - order-service/node_modules/
      - order-service/.npm/
  script:
    - cd order-service
    - npm ci --cache .npm --prefer-offline
    - npx prisma generate
    - npm run lint

order:build:
  stage: build
  image: node:22-alpine
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
      changes: [order-service/**/*]
    - if: '$CI_COMMIT_BRANCH == "main"'
  needs:
    - job: order:lint
      optional: true
  cache:
    key: order-${CI_COMMIT_REF_SLUG}
    paths:
      - order-service/node_modules/
      - order-service/.npm/
  script:
    - cd order-service
    - npm ci --cache .npm --prefer-offline
    - npx prisma generate
    - npm run build
  artifacts:
    paths:
      - order-service/dist/
    expire_in: 1 hour

order:test:
  stage: test
  image: node:22-alpine
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^feature\//'
      changes: [order-service/**/*]
    - if: '$CI_COMMIT_BRANCH =~ /^hotfix\//'
      changes: [order-service/**/*]
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: [order-service/**/*]
    - if: '$CI_COMMIT_BRANCH == "develop"'
      changes: [order-service/**/*]
    - if: '$CI_COMMIT_BRANCH == "main"'
  needs:
    - job: order:lint
      optional: true
  cache:
    key: order-${CI_COMMIT_REF_SLUG}
    paths:
      - order-service/node_modules/
      - order-service/.npm/
  script:
    - cd order-service
    - npm ci --cache .npm --prefer-offline
    - npx prisma generate
    - npm run test
  artifacts:
    when: always
    reports:
      junit: order-service/junit*.xml
    paths:
      - order-service/coverage/
    expire_in: 1 week
