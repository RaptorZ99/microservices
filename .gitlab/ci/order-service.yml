# ─────────────────────────────────────────────────────────
# .gitlab/ci/order-service.yml
# ─────────────────────────────────────────────────────────

.order:rules:
  rules:
    - changes:
        - order-service/**/*
        - .gitlab/ci/order-service.yml
        - .gitlab-ci.yml

lint:order-service:
  stage: lint
  image: node:20-alpine
  extends: .order:rules
  cache:
    key: "order-deps-$CI_COMMIT_REF_SLUG"
    paths:
      - order-service/node_modules/
  variables:
    DATABASE_URL: "file:/tmp/dev.db"
  script:
    - echo "=== Lint Order Service ==="
    - cd order-service
    - npm ci
    - npx prisma generate
    - npm run lint

build:order-service:
  stage: build
  extends:
    - .job:build-push
  needs:
    - job: lint:order-service
      artifacts: false
      optional: true
  variables:
    SERVICE_NAME: "order-service"
    SERVICE_PATH: "./order-service"

sbom:order-service:
  extends: .job:sbom
  needs:
    - job: build:order-service
      artifacts: false
      optional: true
  variables:
    SERVICE_NAME: "order-service"

grype:order-service:
  extends: .job:grype
  needs:
    - job: sbom:order-service
      artifacts: true
      optional: true
  variables:
    SERVICE_NAME: "order-service"

sign:order-service:
  extends: .job:sign
  needs:
    - job: grype:order-service
      artifacts: false
      optional: true
  variables:
    SERVICE_NAME: "order-service"
