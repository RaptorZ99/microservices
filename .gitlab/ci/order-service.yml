# ─────────────────────────────────────────────────────────
# .gitlab/ci/order-service.yml
# ─────────────────────────────────────────────────────────

.order:rules:
  rules:
    - changes:
        - order-service/**/*
        - .gitlab/ci/order-service.yml
        - .gitlab-ci.yml

lint:order-service:
  stage: verify
  image: node:20-alpine
  extends: .order:rules
  cache:
    key: "order-deps-$CI_COMMIT_REF_SLUG"
    paths:
      - order-service/node_modules/
  variables:
    DATABASE_URL: "file:/tmp/dev.db"
  script:
    - echo "=== Lint Order Service ==="
    - cd order-service
    - npm ci
    - npx prisma generate
    - npm run lint

test:unit:order-service:
  stage: test
  image: node:20-alpine
  extends: .order:rules
  cache:
    key: "order-deps-$CI_COMMIT_REF_SLUG"
    paths:
      - order-service/node_modules/
  variables:
    DATABASE_URL: "file:/tmp/dev.db"
  script:
    - cd order-service
    - npm ci
    - npx prisma generate
    - npm test -- --ci
  artifacts:
    reports:
      junit: order-service/junit.xml
    expire_in: 1 week

build:order-service:
  stage: build
  extends: .job:build
  variables:
    SERVICE_NAME: "order-service"
    SERVICE_PATH: "./order-service"

sign:order-service:
  extends: .job:sign
  needs:
    - build:order-service
  variables:
    SERVICE_NAME: "order-service"

sbom:order-service:
  extends: .job:sbom
  needs:
    - build:order-service
  variables:
    SERVICE_NAME: "order-service"

grype:order-service:
  extends: .job:grype
  needs:
    - sbom:order-service
  variables:
    SERVICE_NAME: "order-service"

check:order-service:
  extends: .job:check
  needs:
    - sign:order-service
  variables:
    SERVICE_NAME: "order-service"
