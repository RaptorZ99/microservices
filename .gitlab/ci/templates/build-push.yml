# ─────────────────────────────────────────────────────────────────
# .gitlab/ci/templates/build-push.yml
#
# Template réutilisable : build Docker + push multi-registry
#
# Usage dans un job :
#   extends: .job:build-push
#   variables:
#     SERVICE_NAME: "frontend"       # nom du service (utilisé dans le tag)
#     SERVICE_PATH: "./frontend"     # chemin vers le Dockerfile
#
# Variables GitLab requises (Settings → CI/CD → Variables) :
#   DOCKERHUB_USERNAME   identifiant Docker Hub
#   DOCKERHUB_TOKEN      token Docker Hub (masked)
#
# Variables GitLab injectées automatiquement :
#   CI_REGISTRY          adresse du registry GitLab
#   CI_REGISTRY_IMAGE    image de base du projet
#   CI_REGISTRY_USER     utilisateur CI
#   CI_REGISTRY_PASSWORD token CI temporaire
#   CI_COMMIT_SHORT_SHA  hash court du commit (ex: a1b2c3d4)
#   CI_COMMIT_REF_SLUG   nom de branche normalisé (ex: develop, main)
#   CI_COMMIT_SHA        hash complet du commit
#   CI_PROJECT_URL       URL du projet GitLab
#   CI_COMMIT_BRANCH     nom de la branche courante
#   CI_COMMIT_TAG        tag Git si déclenché par un tag (sinon vide)
# ─────────────────────────────────────────────────────────────────

.job:build-push:
  image: docker:24-cli
  services:
    # docker:dind démarre un daemon Docker dans le runner
    # nécessaire pour exécuter des commandes docker build/push
    - docker:24-dind
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: "/certs"
    # Ces deux variables doivent être surchargées dans chaque job
    SERVICE_NAME: ""      # ex: frontend
    SERVICE_PATH: ""      # ex: ./frontend

  before_script:
    # Connexion au GitLab Container Registry
    # CI_REGISTRY_USER et CI_REGISTRY_PASSWORD sont injectés automatiquement
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    # Connexion à Docker Hub
    # DOCKERHUB_USERNAME et DOCKERHUB_TOKEN sont définis dans Settings → CI/CD → Variables
    - docker login -u $DOCKERHUB_USERNAME -p $DOCKERHUB_TOKEN

  script:
    # ── Construction des noms d'images ──────────────────────────
    # GitLab  : registry.gitlab.com/<namespace>/<projet>/frontend
    # DockerHub : <username>/<projet>-frontend
    - IMAGE_GITLAB="$CI_REGISTRY_IMAGE/$SERVICE_NAME"
    - IMAGE_DOCKERHUB="$DOCKERHUB_USERNAME/$CI_PROJECT_NAME-$SERVICE_NAME"
    - BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

    # ── Build de l'image ────────────────────────────────────────
    # Les --build-arg transmettent les métadonnées OCI au Dockerfile
    # (récupérées via ARG BUILD_DATE / ARG GIT_COMMIT / ARG GIT_SOURCE)
    # On produit 3 tags en une seule passe de build :
    #   :a1b2c3d4     → tag immuable lié au commit exact
    #   :develop      → tag flottant lié à la branche
    #   :a1b2c3d4     → même tag sur Docker Hub
    - |
      docker build \
        --build-arg BUILD_DATE="$BUILD_DATE" \
        --build-arg GIT_COMMIT="$CI_COMMIT_SHA" \
        --build-arg GIT_SOURCE="$CI_PROJECT_URL" \
        --tag "$IMAGE_GITLAB:$CI_COMMIT_SHORT_SHA" \
        --tag "$IMAGE_GITLAB:$CI_COMMIT_REF_SLUG" \
        --tag "$IMAGE_DOCKERHUB:$CI_COMMIT_SHORT_SHA" \
        "$SERVICE_PATH"

    # ── Push vers GitLab Container Registry ─────────────────────
    - docker push "$IMAGE_GITLAB:$CI_COMMIT_SHORT_SHA"
    - docker push "$IMAGE_GITLAB:$CI_COMMIT_REF_SLUG"

    # ── Push vers Docker Hub ─────────────────────────────────────
    - docker push "$IMAGE_DOCKERHUB:$CI_COMMIT_SHORT_SHA"

    # ── Tag :latest sur main uniquement ──────────────────────────
    # On ne pousse :latest que sur la branche main
    # pour éviter de polluer le tag stable avec des builds de develop
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        docker tag "$IMAGE_GITLAB:$CI_COMMIT_SHORT_SHA" "$IMAGE_GITLAB:latest"
        docker push "$IMAGE_GITLAB:latest"
        docker tag "$IMAGE_DOCKERHUB:$CI_COMMIT_SHORT_SHA" "$IMAGE_DOCKERHUB:latest"
        docker push "$IMAGE_DOCKERHUB:latest"
        echo "Tags latest pushes (branche main)"
      fi

    # ── Tag semver si déclenché par un tag Git ───────────────────
    # ex: git tag v1.2.3 → pousse l'image avec le tag 1.2.3
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        SEMVER="${CI_COMMIT_TAG#v}"
        docker tag "$IMAGE_GITLAB:$CI_COMMIT_SHORT_SHA" "$IMAGE_GITLAB:$SEMVER"
        docker push "$IMAGE_GITLAB:$SEMVER"
        echo "Tag semver $SEMVER pushe"
      fi

    # ── Résumé ───────────────────────────────────────────────────
    - |
      echo ""
      echo "==========================================="
      echo " Images produites pour : $SERVICE_NAME"
      echo "==========================================="
      echo " GitLab     : $IMAGE_GITLAB:$CI_COMMIT_SHORT_SHA"
      echo " GitLab     : $IMAGE_GITLAB:$CI_COMMIT_REF_SLUG"
      echo " Docker Hub : $IMAGE_DOCKERHUB:$CI_COMMIT_SHORT_SHA"
      echo "==========================================="

  # S'exécute sur develop/main si les fichiers du service ont changé,
  # ou toujours sur un tag Git (release).
  # $SERVICE_NAME est expansé depuis les variables: du job enfant.
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
      changes:
        - $SERVICE_NAME/**/*
        - .gitlab/ci/$SERVICE_NAME.yml
        - .gitlab-ci.yml
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - $SERVICE_NAME/**/*
        - .gitlab/ci/$SERVICE_NAME.yml
        - .gitlab-ci.yml
    - if: '$CI_COMMIT_TAG'
