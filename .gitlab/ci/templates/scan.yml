# ─────────────────────────────────────────────────────────────────
# .gitlab/ci/templates/scan.yml
#
# Template : scan de vulnérabilités via Grype
# Stage : scan (develop + main)
#
# Usage :
#   extends: .job:grype
#   needs:
#     - job: sbom:SERVICE
#       artifacts: true
#       optional: true
#   variables:
#     SERVICE_NAME: "frontend"
# ─────────────────────────────────────────────────────────────────

.job:grype:
  stage: scan
  image: alpine:3.19
  before_script:
    - apk add --no-cache curl
    - curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
  script:
    - echo "=== Scan de vulnerabilites pour $SERVICE_NAME ==="
    - grype sbom:sbom-$SERVICE_NAME.json
    - echo "Scan termine"
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH == "main"'
