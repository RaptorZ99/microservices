# ─────────────────────────────────────────────────────────
# .gitlab/ci/book-service.yml
# ─────────────────────────────────────────────────────────

.book:rules:
  rules:
    - changes:
        - book-service/**/*
        - .gitlab/ci/book-service.yml
        - .gitlab-ci.yml

lint:book-service:
  stage: verify
  image: node:20-alpine
  extends: .book:rules
  cache:
    key: "book-deps-$CI_COMMIT_REF_SLUG"
    paths:
      - book-service/node_modules/
  variables:
    DATABASE_URL: "file:/tmp/dev.db"
  script:
    - echo "=== Lint Book Service ==="
    - cd book-service
    - npm ci
    - npx prisma generate
    - npm run lint

test:unit:book-service:
  stage: test
  image: node:20-alpine
  extends: .book:rules
  cache:
    key: "book-deps-$CI_COMMIT_REF_SLUG"
    paths:
      - book-service/node_modules/
  variables:
    DATABASE_URL: "file:/tmp/dev.db"
  script:
    - cd book-service
    - npm ci
    - npx prisma generate
    - npm test -- --ci
  artifacts:
    reports:
      junit: book-service/junit.xml
    expire_in: 1 week

build:book-service:
  stage: build
  extends: .job:build
  variables:
    SERVICE_NAME: "book-service"
    SERVICE_PATH: "./book-service"

sign:book-service:
  extends: .job:sign
  needs:
    - build:book-service
  variables:
    SERVICE_NAME: "book-service"

sbom:book-service:
  extends: .job:sbom
  needs:
    - build:book-service
  variables:
    SERVICE_NAME: "book-service"

grype:book-service:
  extends: .job:grype
  needs:
    - sbom:book-service
  variables:
    SERVICE_NAME: "book-service"

check:book-service:
  extends: .job:check
  needs:
    - sign:book-service
  variables:
    SERVICE_NAME: "book-service"
