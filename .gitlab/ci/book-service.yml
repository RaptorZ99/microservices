# ─────────────────────────────────────────────────────────
# Pipeline Book Service (NestJS)
# ─────────────────────────────────────────────────────────

.book:rules:
  rules:
    - changes:
        - book-service/**/*
        - .gitlab/ci/book-service.yml
        - .gitlab-ci.yml

lint:book-service:
  stage: lint
  image: node:20-alpine
  extends: .book:rules
  cache:
    key: "book-deps-$CI_COMMIT_REF_SLUG"
    paths:
      - book-service/node_modules/
  variables:
    DATABASE_URL: "file:/tmp/dev.db"
  script:
    - echo "=== Lint Book Service ==="
    - cd book-service
    - npm ci
    - npx prisma generate
    - npm run lint

build:book-service:
  stage: build
  image: node:20-alpine
  extends: .book:rules
  cache:
    key: "book-deps-$CI_COMMIT_REF_SLUG"
    paths:
      - book-service/node_modules/
  variables:
    DATABASE_URL: "file:/tmp/dev.db"
  script:
    - echo "=== Build Book Service ==="
    - cd book-service
    - npm ci
    - npx prisma generate
    - npm run build
  artifacts:
    paths:
      - book-service/dist/
    expire_in: 1 hour
