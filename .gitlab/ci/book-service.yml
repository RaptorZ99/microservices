# ─────────────────────────────────────────────────────────
# .gitlab/ci/book-service.yml
# ─────────────────────────────────────────────────────────

.book:rules:
  rules:
    - changes:
        - book-service/**/*
        - .gitlab/ci/book-service.yml
        - .gitlab-ci.yml

lint:book-service:
  stage: lint
  image: node:20-alpine
  extends: .book:rules
  cache:
    key: "book-deps-$CI_COMMIT_REF_SLUG"
    paths:
      - book-service/node_modules/
  variables:
    DATABASE_URL: "file:/tmp/dev.db"
  script:
    - echo "=== Lint Book Service ==="
    - cd book-service
    - npm ci
    - npx prisma generate
    - npm run lint

# ── Build Docker + push multi-registry ───────────────────
build:book-service:
  stage: build
  extends:
    - .job:build-push
  variables:
    SERVICE_NAME: "book-service"
    SERVICE_PATH: "./book-service"
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main"'
