# ─────────────────────────────────────────────────────────
# .gitlab/ci/book-service.yml
# ─────────────────────────────────────────────────────────

.book:rules:
  rules:
    - changes:
        - book-service/**/*
        - .gitlab/ci/book-service.yml
        - .gitlab-ci.yml

lint:book-service:
  stage: lint
  image: node:20-alpine
  extends: .book:rules
  cache:
    key: "book-deps-$CI_COMMIT_REF_SLUG"
    paths:
      - book-service/node_modules/
  variables:
    DATABASE_URL: "file:/tmp/dev.db"
  script:
    - echo "=== Lint Book Service ==="
    - cd book-service
    - npm ci
    - npx prisma generate
    - npm run lint

build:book-service:
  stage: build
  extends:
    - .job:build-push
  needs:
    - job: lint:book-service
      artifacts: false
  variables:
    SERVICE_NAME: "book-service"
    SERVICE_PATH: "./book-service"

sbom:book-service:
  extends: .job:sbom
  needs:
    - job: build:book-service
      artifacts: false
  variables:
    SERVICE_NAME: "book-service"

grype:book-service:
  extends: .job:grype
  needs:
    - job: sbom:book-service
      artifacts: true
  variables:
    SERVICE_NAME: "book-service"

sign:book-service:
  extends: .job:sign
  needs:
    - job: grype:book-service
      artifacts: false
  variables:
    SERVICE_NAME: "book-service"
